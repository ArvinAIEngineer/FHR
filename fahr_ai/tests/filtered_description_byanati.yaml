openapi: 3.0.1
info:
  title: bayanati-api
  version: '1.0'
servers:
- url: http://10.254.115.17:8090/
paths:
  /Bayanati/bayanati-api/api/MobileAPI/GET_PENDING_LEAVE_DET:
    post:
      tags:
      - Dashboard
      summary: Get Pending Leave Details
      description: |
        Retrieves pending leave details for a specific employee using i_PERSON_ID.
        This endpoint allows filtering by leave type and supports multiple languages.
        
        **Usage:**
        - Use this endpoint to fetch leave requests that are pending approval by passing i_PERSON_ID
        - Filter by date range using start and end dates or leave empty
        - Specify leave type or leave empty for all types
        - Results are returned in the specified language
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/bayanati_api.Models.EmpDashboard.LeaveDetailRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/bayanati_api.Models.EmpDashboard.DashboardResponse'
  /Bayanati/bayanati-api/api/MobileAPI/GET_EMP_BUSINESS_CARD_DETAIL:
      post:
        tags:
        - Business Card
        summary: Get Employee Business Card Details
        description: |
          Retrieves business card information for a specific employee using i_EMP_PERSON_ID.
          This endpoint returns employee profile information including ministry name, full name,
          job title, email address, and work telephone number.
          
          **Usage:**
          - i_EMP_PERSON_ID is same value as i_PERSON_ID
          - Use this endpoint to fetch employee business card details by passing i_EMP_PERSON_ID
          - Specify language preference using i_LANG parameter or leave empty
          - Returns formatted business card information suitable for display or contact purposes
          - Useful for employee directory, contact lists, or profile displays 
        requestBody:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/bayanati_api.Models.BusinesCard.GET_EMP_BUSINESS_CARD_DETAIL.EmpBusinessCardDetailRequest'
        responses:
          '200':
            description: OK
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/bayanati_api.Models.BusinesCard.GET_EMP_BUSINESS_CARD_DETAIL.EmpBusinessCardDetailResponse'                
