        i_PERSON_ID:
          type: integer
          format: int32
        i_LEAVE_NAME:
          type: string
          nullable: true
          enum:
            - ""
        i_START_DATE:
          type: string
          nullable: true
          enum:
            - ""
        i_END_DATE:
          type: string
          nullable: true
          enum:
            - ""
        i_LANG:
          type: string
          nullable: true
          enum:
            - ""
      additionalProperties: false

    bayanati_api.Models.BusinesCard.GET_EMP_BUSINESS_CARD_DETAIL.EmpBusinessCardDetailRequest:
      type: object
