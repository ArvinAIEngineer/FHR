openapi: 3.0.1
info:
  title: bayanati-api
  contact:
    name: Hello
  version: '1.0'
  description: bayanati-api
servers:
- url: http://10.254.115.17:8090/
tags:
- name: Employee Profile
  description: APIs related to Employee Profile
- name: Employee Documents
  description: APIs related to Employee Documents
- name: Leave Management
  description: APIs related to managing employee leave records
- name: Time Attendance
  description: APIs related to managing employee Attendance records
- name: Letter Request
  description: APIs related to Generating To Whom It may concern letters
- name: Dashboard
  description: This collection of POST-based APIs serves the Dashboard module of the
    Bayanati system. It provides employees and managers with timely, relevant data
    related to attendance, leaves, holidays, profile progress, KPIs, and other performance
    metrics. The API endpoints are grouped under the "Dashboard" tag and are intended
    for use in employee self-service and management interfaces.
- name: PMS
  description: APIs related to Employee Annual Performance Management System which
    consists of three phases, Annual Agreement, Interim Review and Final Evaluation
    Phase. Employees can set their objectives, competencies and send for Manager Approval.
    Manager can view their employee pms submissions and review.
- name: MaQassart
  description: Send and Receive Thank you Cards within Federal Government
- name: Business Card
  description: Get or Request for Business Card Requests
paths:
