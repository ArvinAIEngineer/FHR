      summary: Get working hours
      description: Allows employees to view their daily work hours, violations such
        as Early Out, Delay, Missing Clock In / Out for the provided i_FROM_DATE and
        i_TO_DATE. By default starting of the current month will be passed on i_FROM_DATE
