        like award plan, status, and year.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/bayanati_api.Models.Awards.GET_AWARD_NOMINEES_BY_EMP.GetAwardNomineesByEmployeeRequest'
