  /Bayanati/bayanati-api/api/MobileAPI/GET_LEAVE_HISTORY:
    get:
      tags:
      - Leave Management
      operationId: getLeaveHistoryGET
      summary: Retrieve leave history for an employee (GET method)
      description: Provides historical data of leave requests submitted by an employee.
        Includes date range, language, and person ID. This endpoint returns list of
        all leave requests submitted by user for the specified duration. The response
        includes the leave type, status, duration, number of days and attachments
        list.
      parameters:
      - name: I_SESSION_ID
        in: query
        schema:
          type: string
        description: Session identifier
      - name: I_PERSON_ID
        in: query
        required: true
        schema:
          type: integer
          format: int32
        description: Person identifier
      - name: I_START_DATE
        in: query
        schema:
          type: string
        description: Start date for leave history
      - name: I_END_DATE
        in: query
        schema:
          type: string
        description: End date for leave history
      - name: I_LANG
        in: query
        schema:
          type: string
        description: Language code
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/bayanati_api.Models.Leaves.GET_LEAVE_HISTORY.LeaveHistoryResponse'
    post:
      tags:
      - Leave Management
      operationId: getLeaveHistoryPOST
      summary: Retrieve leave history for an employee (POST method)
      description: Provides historical data of leave requests submitted by an employee.
        Includes date range, language, and person ID. This endpoint returns list of
        all leave requests submitted by user for the specified duration. The response
        includes the leave type, status, duration, number of days and attachments
        list.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/bayanati_api.Models.Leaves.GET_LEAVE_HISTORY.LeaveHistoryRequest'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/bayanati_api.Models.Leaves.GET_LEAVE_HISTORY.LeaveHistoryResponse'
  /Bayanati/bayanati-api/api/MobileAPI/GET_LEAVE_MGR_DETAILS:
