# Embeddings and LLM configuration
environment:
  azure_endpoint: "https://ai-nbldev074831068106.openai.azure.com"
  openai_api_version: "2023-05-15"
  azure_deployment_embedding: "text-embedding-ada-002-2"
  azure_deployment_llm: "gpt-35-turbo"
  api_key: "YOUR_API_KEY_HERE"

# Vector store configuration
vectorstore:
  type: "chroma"
  persist_directory: "chroma_db"
  collection_name: "fahr_documents"

# Text extraction chunking options
text:
  chunk_size: 1000      # characters per chunk
  chunk_overlap: 100    # overlapping characters between chunks

# Service defaults
service:
  host: "0.0.0.0"
  port: 8000 