<!DOCTYPE html>
<html>
<head>
  <title>CRM Tickets</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
    <div class="container-fluid">
      <a class="navbar-brand fw-bold" href="/">CRM Portal</a>
      <div class="navbar-nav">
        <a class="nav-link" href="/">Dashboard</a>
        <a class="nav-link active" href="/tickets">Tickets</a>
      </div>
    </div>
  </nav>

  <div class="container py-4">
    <div class="row">
      <!-- Ticket Form -->
      <div class="col-lg-4 mb-4">
        <div class="card shadow-sm">
          <div class="card-header bg-white fw-bold">Create New Ticket</div>
          <div class="card-body">
            <form action="/submit" method="post" class="row g-3">
              <div class="col-12">
                <label class="form-label">Title</label>
                <input type="text" name="title" class="form-control" required>
              </div>
              <div class="col-12">
                <label class="form-label">Description</label>
                <textarea name="description" class="form-control" rows="3" required></textarea>
              </div>
              <div class="col-12">
                <label class="form-label">Priority</label>
                <select name="priority" class="form-select">
                  <option value="low">Low</option>
                  <option value="medium">Medium</option>
                  <option value="high">High</option>
                </select>
              </div>
              <div class="col-12">
                <label class="form-label">Category</label>
                <select name="category" class="form-select">
                  <option value="Bug">Bug</option>
                  <option value="Feature">Feature</option>
                  <option value="Support">Support</option>
                </select>
              </div>
              <div class="col-12">
                <button type="submit" class="btn btn-success w-100">Submit Ticket</button>
              </div>
            </form>
          </div>
        </div>
      </div>

      <!-- Tickets Table -->
      <div class="col-lg-8">
        <div class="card shadow-sm">
          <div class="card-header bg-white fw-bold">All Tickets</div>
          <div class="card-body p-0">
            <table class="table table-hover align-middle mb-0">
              <thead class="table-light">
                <tr>
                  <th>ID</th>
                  <th>Title</th>
                  <th>Category</th>
                  <th>Priority</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody>
                {% for ticket in tickets %}
                <tr>
                  <td>{{ ticket.id }}</td>
                  <td>{{ ticket.title }}</td>
                  <td>{{ ticket.category }}</td>
                  <td>
                    <span class="badge 
                      {% if ticket.priority == 'high' %} bg-danger 
                      {% elif ticket.priority == 'medium' %} bg-warning text-dark 
                      {% else %} bg-secondary 
                      {% endif %}">
                      {{ ticket.priority }}
                    </span>
                  </td>
                  <td>
                    <a href="/ticket/{{ ticket.id }}" class="btn btn-sm btn-outline-primary">View</a>
                  </td>
                </tr>
                {% else %}
                <tr>
                  <td colspan="5" class="text-center text-muted">No tickets yet</td>
                </tr>
                {% endfor %}
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
